<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altamira Market & Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        /* Contenedor de imagen con relación de aspecto fija (16:9 moderno) */
        .product-image-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 */
            overflow: hidden;
            background-color: #f3f4f6; /* Gris muy claro para carga */
        }
        
        .product-image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Asegura que cubra el espacio sin deformarse */
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-image-container img {
            transform: scale(1.05); /* Efecto de zoom suave al pasar el mouse */
        }
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* Estilos globales para inputs y formularios */
        input, select, textarea { 
            font-family: 'Inter', sans-serif;
            border-color: #e5e7eb !important; /* Gris suave por defecto */
        }
        input:focus, select:focus, textarea:focus {
            border-color: #6366f1 !important; /* Indigo al enfocar */
            ring-color: #a5b4fc !important;
        }

        /* Viñetas de colores modernas (indicadores de estado suaves) */
        .status-bullet {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen antialiased">

    <nav class="bg-white border-b sticky top-0 z-50 py-4 shadow-sm">
        <div class="container mx-auto px-6 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2.5 rounded-xl shadow-inner">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tighter text-gray-950">Altamira<span class="text-indigo-600">Market</span></h1>
            </div>
            
            <div class="flex items-center gap-5">
                <div class="relative">
                    <select id="filter-category" class="bg-gray-100 border-none text-sm rounded-full pl-5 pr-10 py-2.5 outline-none focus:ring-2 focus:ring-indigo-300 appearance-none font-medium text-gray-700 cursor-pointer">
                        <option value="All">Todas las categorías</option>
                        <option value="Tecnología">Tecnología</option>
                        <option value="Vehículos">Vehículos</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Ropa">Ropa</option>
                        <option value="Servicios">Servicios</option>
                        <option value="Otros">Otros</option>
                    </select>
                    <svg class="w-4 h-4 text-gray-400 absolute right-3.5 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                <button id="admin-main-btn" class="bg-gray-950 text-white px-6 py-2.5 rounded-full text-sm font-semibold hover:bg-gray-800 transition duration-300 shadow-sm flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Admin
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10 flex-grow">
        
        <section id="admin-panel" class="hidden bg-white border border-gray-100 rounded-3xl p-8 shadow-sm mb-16 transition-all duration-500">
            <div class="flex justify-between items-center mb-8 pb-4 border-b border-gray-100">
                <div class="flex items-center gap-3">
                    <span class="status-bullet bg-indigo-500 animate-pulse"></span>
                    <h2 class="text-xl font-bold tracking-tight text-gray-950">Centro de Control</h2>
                </div>
                <button id="btn-logout" class="text-red-500 text-xs font-bold hover:text-red-600 transition flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Cerrar Sesión
                </button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <form id="product-form" class="space-y-4 p-6 bg-gray-50 rounded-2xl border border-gray-100 shadow-inner">
                    <div class="flex items-center gap-2.5 mb-2">
                        <span class="status-bullet bg-indigo-400"></span>
                        <p class="text-sm font-semibold text-indigo-700 uppercase tracking-wider">Nuevo Producto</p>
                    </div>
                    <input type="text" id="title" placeholder="¿Qué estás vendiendo?" class="w-full p-3.5 border rounded-xl text-sm" required>
                    <select id="category" class="w-full p-3.5 border rounded-xl text-sm font-medium text-gray-700" required></select>
                    <input type="number" id="price" placeholder="Precio (COP)" class="w-full p-3.5 border rounded-xl text-sm" required>
                    <input type="text" id="contact" placeholder="WhatsApp (ej. 573...)" class="w-full p-3.5 border rounded-xl text-sm" required>
                    <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 bg-white">
                        <input type="file" id="image" accept="image/*" class="text-xs w-full text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer" required>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-3.5 rounded-xl text-sm font-bold shadow-md hover:bg-indigo-700 transition duration-300 flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Publicar Producto
                    </button>
                </form>

                <form id="news-form" class="space-y-4 p-6 bg-gray-50 rounded-2xl border border-gray-100 shadow-inner">
                    <div class="flex items-center gap-2.5 mb-2">
                        <span class="status-bullet bg-orange-400"></span>
                        <p class="text-sm font-semibold text-orange-700 uppercase tracking-wider">Nuevo Anuncio</p>
                    </div>
                    <input type="text" id="news-title" placeholder="Título del anuncio" class="w-full p-3.5 border rounded-xl text-sm" required>
                    <textarea id="news-content" placeholder="Escribe el mensaje aquí..." class="w-full p-3.5 border rounded-xl text-sm h-32 resize-none" required></textarea>
                    <button type="submit" class="w-full bg-orange-500 text-white py-3.5 rounded-xl text-sm font-bold shadow-md hover:bg-orange-600 transition duration-300 flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A1.76 1.76 0 015 12.286V5.882a1.76 1.76 0 013.417-.592l2.147 6.15M18 13a3 3 0 110-6m-6.232 3.421a3 3 0 013.06 3.548 3 3 0 01-3.06 3.548M18 13h1a4 4 0 11-8 0h1"></path></svg>
                        Enviar al Blog
                    </button>
                </form>

                <form id="event-form" class="space-y-4 p-6 bg-gray-50 rounded-2xl border border-gray-100 shadow-inner">
                    <div class="flex items-center gap-2.5 mb-2">
                        <span class="status-bullet bg-emerald-400"></span>
                        <p class="text-sm font-semibold text-emerald-700 uppercase tracking-wider">Nuevo Evento</p>
                    </div>
                    <input type="text" id="event-name" placeholder="Nombre del evento" class="w-full p-3.5 border rounded-xl text-sm" required>
                    <div class="relative">
                        <input type="date" id="event-date" class="w-full p-3.5 border rounded-xl text-sm text-gray-700 cursor-pointer" required>
                        <svg class="w-5 h-5 text-gray-400 absolute right-3.5 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 3V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <input type="text" id="event-location" placeholder="Ubicación (ej. Salón Social)" class="w-full p-3.5 border rounded-xl text-sm" required>
                    <button type="submit" class="w-full bg-emerald-600 text-white py-3.5 rounded-xl text-sm font-bold shadow-md hover:bg-emerald-700 transition duration-300 flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 3V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Agendar Evento
                    </button>
                </form>
            </div>
        </section>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-12">
            <div class="xl:col-span-3">
                <div class="flex items-center gap-4 mb-8">
                    <span class="status-bullet bg-indigo-500 w-3 h-3"></span>
                    <h2 class="text-3xl font-extrabold text-gray-950 tracking-tighter">Catálogo de Productos</h2>
                </div>
                <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
            
            <div class="xl:col-span-1">
                <div class="flex items-center gap-4 mb-8">
                    <span class="status-bullet bg-orange-500 w-3 h-3"></span>
                    <h2 class="text-3xl font-extrabold text-gray-950 tracking-tighter">Anuncios</h2>
                </div>
                <div id="news-feed" class="space-y-6"></div>
            </div>
        </div>

        <section class="mt-24 pt-12 border-t border-gray-100">
            <div class="flex items-center justify-center gap-4 mb-10">
                <span class="status-bullet bg-emerald-500 w-3 h-3"></span>
                <h2 class="text-3xl font-extrabold text-gray-950 tracking-tighter text-center">Calendario de Eventos</h2>
                <span class="status-bullet bg-emerald-500 w-3 h-3"></span>
            </div>
            <div id="event-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>

    </main>

    <footer class="bg-white border-t border-gray-100 py-8 mt-16 shadow-inner">
        <div class="container mx-auto px-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <p class="text-sm text-gray-500 font-medium">© 2026 Altamira Campestre. Uso exclusivo residentes.</p>
            <div class="flex items-center gap-3 bg-gray-50 px-5 py-2.5 rounded-full border border-gray-100 shadow-sm">
                <span class="status-bullet bg-green-400"></span>
                <span class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Ventas Confirmadas:</span>
                <span id="stats-count" class="text-xl font-extrabold text-indigo-600 tabular-nums">0</span>
            </div>
        </div>
    </footer>

    <div id="login-modal" class="fixed inset-0 bg-gray-950/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden transition-opacity duration-300">
        <div class="bg-white w-full max-w-md rounded-3xl p-10 shadow-2xl border border-gray-100 transform transition-transform duration-300 scale-95 opacity-0 modal-content">
            <div class="text-center mb-8">
                <div class="bg-indigo-100 text-indigo-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h3 class="text-2xl font-extrabold tracking-tight text-gray-950">Acceso Administrador</h3>
                <p class="text-gray-500 mt-1.5 text-sm">Ingresa tus credenciales para continuar</p>
            </div>
            <form id="login-form" class="space-y-5">
                <div class="relative">
                    <input type="email" id="login-email" placeholder="Correo electrónico" class="w-full p-4 border rounded-xl text-sm pl-12" required>
                    <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path></svg>
                </div>
                <div class="relative">
                    <input type="password" id="login-password" placeholder="Contraseña" class="w-full p-4 border rounded-xl text-sm pl-12" required>
                    <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-sm uppercase tracking-widest shadow-lg hover:bg-indigo-700 transition duration-300">Iniciar Sesión</button>
                <button type="button" id="close-login" class="w-full text-xs text-gray-400 font-semibold uppercase mt-3 hover:text-gray-600 transition">Cancelar</button>
            </form>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, setDoc, increment, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Reemplaza esto con tu configuración real de Firebase si es diferente
    const firebaseConfig = {
        apiKey: "AIzaSyA7eG9w1-M59xqrMsXigc4ABXA_7ArCVjk",
        authDomain: "altamira-market.firebaseapp.com",
        projectId: "altamira-market",
        storageBucket: "altamira-market.firebasestorage.app",
        messagingSenderId: "197188006366",
        appId: "1:197188006366:web:5ef21cc0b63046e39e6d4f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let products = [], news = [], events = [], isAdmin = false;

    // --- SINCRONIZACIÓN DE INTERFAZ (LOGIC) ---
    onAuthStateChanged(auth, (user) => {
        isAdmin = !!user;
        const panel = document.getElementById('admin-panel');
        const mainBtn = document.getElementById('admin-main-btn');
        
        if (isAdmin) {
            panel.classList.remove('hidden');
            // Pequeño delay para la animación de entrada
            setTimeout(() => panel.classList.add('opacity-100', 'translate-y-0'), 10);
            mainBtn.classList.add('hidden');
        } else {
            panel.classList.add('hidden');
            panel.classList.remove('opacity-100', 'translate-y-0');
            mainBtn.classList.remove('hidden');
        }
        renderAll();
    });

    const renderAll = () => { renderProducts(); renderNews(); renderEvents(); };

    // --- CARGA DE DATOS (REALTIME) ---
    onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), (snap) => {
        products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderProducts();
    });

    onSnapshot(query(collection(db, "news"), orderBy("date", "desc")), (snap) => {
        news = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderNews();
    });

    onSnapshot(query(collection(db, "events"), orderBy("eventDate", "asc")), (snap) => {
        events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderEvents();
    });

    onSnapshot(doc(db, "stats", "global"), (d) => {
        if(d.exists()) {
            const countElem = document.getElementById('stats-count');
            // Animación simple de conteo
            const oldCount = parseInt(countElem.innerText);
            const newCount = d.data().salesCount || 0;
            if (oldCount !== newCount) {
                countElem.classList.add('scale-110', 'text-green-500');
                setTimeout(() => {
                    countElem.innerText = newCount;
                    countElem.classList.remove('scale-110', 'text-green-500');
                }, 200);
            } else {
                countElem.innerText = newCount;
            }
        }
    });

    // --- RENDERIZADO UNIFICADO CON ESTILOS SOLICITADOS ---
    function renderProducts() {
        const filter = document.getElementById('filter-category').value;
        const filtered = filter === "All" ? products : products.filter(p => p.category === filter);
        const grid = document.getElementById('product-grid');
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="col-span-full text-center py-16 bg-white rounded-2xl border border-gray-100"><svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg><p class="text-gray-500 font-medium">No hay productos en esta categoría.</p></div>';
            return;
        }

        grid.innerHTML = filtered.map(p => `
            <div class="product-card bg-white rounded-3xl border border-gray-100 overflow-hidden transition-all duration-300 hover:shadow-xl hover:border-indigo-50 flex flex-col group relative">
                <div class="product-image-container">
                    <img src="${p.image}" alt="${p.title}" loading="lazy">
                    <span class="absolute top-4 left-4 bg-white/80 backdrop-blur-sm text-indigo-700 text-[10px] font-bold uppercase tracking-wider px-3 py-1 rounded-full shadow-sm">${p.category}</span>
                </div>
                <div class="p-6 flex flex-col flex-grow">
                    <h3 class="text-base font-semibold text-gray-900 line-clamp-2 mb-2.5 h-12 leading-tight group-hover:text-indigo-700 transition-colors">${p.title}</h3>
                    <p class="text-2xl font-extrabold text-gray-950 mb-5 tabular-nums tracking-tight">$${parseInt(p.price).toLocaleString('es-CO')}</p>
                    <div class="flex flex-col gap-3 mt-auto">
                        <a href="https://wa.me/${p.contact}" target="_blank" class="bg-green-500 text-white text-center py-3 rounded-xl text-xs font-extrabold uppercase tracking-widest shadow hover:bg-green-600 transition duration-300 flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.001 5.45-4.435 9.884-9.886 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.363-1.669c1.738.948 3.7 1.448 5.684 1.449h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                            Contactar
                        </a>
                        ${isAdmin ? `<button onclick="window.adminDelete('${p.id}')" class="text-red-500 text-[11px] font-bold uppercase tracking-wider py-1 hover:text-red-700 transition">Gestionar</button>` : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderNews() {
        const feed = document.getElementById('news-feed');
        if (news.length === 0) {
            feed.innerHTML = '<div class="text-center py-12 bg-white rounded-2xl border border-gray-100"><p class="text-gray-500 text-sm font-medium">No hay anuncios recientes.</p></div>';
            return;
        }

        feed.innerHTML = news.map(n => `
            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm relative overflow-hidden group hover:border-orange-100 transition duration-300">
                <div class="absolute top-0 left-0 w-1.5 h-full bg-orange-400 group-hover:w-2 transition-all"></div>
                <div class="flex items-center gap-2.5 mb-3.5">
                    <span class="status-bullet bg-orange-100 text-orange-600 w-6 h-6 flex items-center justify-center rounded-full">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    </span>
                    <h4 class="font-bold text-base text-gray-950 leading-snug group-hover:text-orange-700 transition-colors">${n.title}</h4>
                </div>
                <p class="text-sm text-gray-600 leading-relaxed pl-8">${n.content}</p>
                <p class="text-[10px] text-gray-400 font-medium pl-8 mt-3 flex items-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    ${new Date(n.date).toLocaleDateString('es-CO', {day: 'numeric', month: 'short'})}
                </p>
                ${isAdmin ? `<button onclick="window.deleteNews('${n.id}')" class="absolute top-3 right-3 text-gray-300 hover:text-red-500 transition font-bold text-xl leading-none">&times;</button>` : ''}
            </div>
        `).join('');
    }

    function renderEvents() {
        const list = document.getElementById('event-list');
        if (events.length === 0) {
            list.innerHTML = '<div class="col-span-full text-center py-16 bg-white rounded-2xl border border-gray-100"><p class="text-gray-500 font-medium">No hay eventos programados próximamente.</p></div>';
            return;
        }

        list.innerHTML = events.map(e => {
            const date = new Date(e.eventDate + "T00:00:00");
            const esHoy = new Date().toDateString() === date.toDateString();
            
            return `
                <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm flex items-center gap-5 relative group hover:border-emerald-100 hover:shadow-lg transition duration-300 ${esHoy ? 'border-emerald-200 bg-emerald-50/30' : ''}">
                    <div class="bg-emerald-600 text-white min-w-[60px] h-[60px] rounded-2xl flex flex-col items-center justify-center shadow-md relative group-hover:scale-105 transition-transform">
                        <span class="text-2xl font-extrabold leading-none tabular-nums">${date.getDate()}</span>
                        <span class="text-[10px] font-bold uppercase tracking-wider mt-0.5">${date.toLocaleString('es-CO', {month: 'short'}).replace('.','')}</span>
                        ${esHoy ? '<span class="absolute -top-1.5 -right-1.5 flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span></span>' : ''}
                    </div>
                    <div class="flex-grow">
                        <h4 class="font-bold text-base text-gray-950 leading-snug group-hover:text-emerald-700 transition-colors">${e.name}</h4>
                        <div class="flex items-center gap-1.5 mt-1.5">
                            <span class="status-bullet bg-emerald-100 text-emerald-600 w-5 h-5 flex items-center justify-center rounded-full">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            </span>
                            <p class="text-xs font-semibold text-emerald-700 uppercase tracking-wide line-clamp-1">${e.location}</p>
                        </div>
                    </div>
                    ${isAdmin ? `<button onclick="window.deleteEvent('${e.id}')" class="absolute top-3 right-3 text-gray-300 hover:text-red-500 transition font-bold text-xl leading-none">&times;</button>` : ''}
                </div>
            `;
        }).join('');
    }

    // --- ACCIONES ADMIN (LOGIC) ---
    window.adminDelete = async (id) => {
        const p = products.find(prod => prod.id === id);
        if(!p) return;

        const action = prompt(`Gestionar "${p.title}":\n1. Marcar como VENDIDO (suma a estadísticas y elimina)\n2. ELIMINAR definitivamente\n3. Cancelar`);
        
        if (action === "1") {
            try {
                await setDoc(doc(db, "stats", "global"), { salesCount: increment(1) }, { merge: true });
                await deleteDoc(doc(db, "products", id));
                // Opcional: Notificar éxito suavemente
            } catch (e) { alert("Error al actualizar estadísticas."); }
        } else if (action === "2") {
            if(confirm(`¿Estás seguro de eliminar "${p.title}"?`)) {
                await deleteDoc(doc(db, "products", id));
            }
        }
    };

    window.deleteNews = async (id) => { 
        if(confirm("¿Eliminar este anuncio permanentemente?")) await deleteDoc(doc(db, "news", id)); 
    };
    
    window.deleteEvent = async (id) => { 
        if(confirm("¿Eliminar este evento del calendario?")) await deleteDoc(doc(db, "events", id)); 
    };

    // --- FORMULARIOS (SUBMIT LOGIC) ---
    const addLoadingState = (btn) => {
        btn.disabled = true;
        btn.dataset.oldText = btn.innerHTML;
        btn.innerHTML = '<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Procesando...';
    };

    const removeLoadingState = (btn) => {
        btn.disabled = false;
        btn.innerHTML = btn.dataset.oldText;
    };

    document.getElementById('product-form').onsubmit = async (e) => {
        e.preventDefault();
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const fileInput = document.getElementById('image');
        
        if(!fileInput.files[0]) return alert("Por favor selecciona una imagen.");
        
        addLoadingState(submitBtn);
        
        const reader = new FileReader();
        reader.onloadend = async () => {
            try {
                await addDoc(collection(db, "products"), {
                    title: document.getElementById('title').value.trim(),
                    category: document.getElementById('category').value,
                    price: parseFloat(document.getElementById('price').value),
                    contact: document.getElementById('contact').value.trim().replace(/[^0-9]/g, ''), // Solo números
                    image: reader.result, // Base64 (para demo, mejor usar Firebase Storage en producción)
                    date: Date.now()
                });
                e.target.reset();
            } catch (err) { alert("Error al publicar el producto."); }
            finally { removeLoadingState(submitBtn); }
        };
        reader.readAsDataURL(fileInput.files[0]);
    };

    document.getElementById('news-form').onsubmit = async (e) => {
        e.preventDefault();
        const submitBtn = e.target.querySelector('button[type="submit"]');
        addLoadingState(submitBtn);
        
        try {
            await addDoc(collection(db, "news"), {
                title: document.getElementById('news-title').value.trim(),
                content: document.getElementById('news-content').value.trim(),
                date: Date.now()
            });
            e.target.reset();
        } catch (err) { alert("Error al publicar el anuncio."); }
        finally { removeLoadingState(submitBtn); }
    };

    document.getElementById('event-form').onsubmit = async (e) => {
        e.preventDefault();
        const submitBtn = e.target.querySelector('button[type="submit"]');
        addLoadingState(submitBtn);
        
        try {
            await addDoc(collection(db, "events"), {
                name: document.getElementById('event-name').value.trim(),
                eventDate: document.getElementById('event-date').value, // YYYY-MM-DD
                location: document.getElementById('event-location').value.trim(),
                createdAt: Date.now()
            });
            e.target.reset();
        } catch (err) { alert("Error al agendar el evento."); }
        finally { removeLoadingState(submitBtn); }
    };

    // --- MODAL, LOGIN & UI INTERACTION ---
    const loginModal = document.getElementById('login-modal');
    const modalContent = loginModal.querySelector('.modal-content');

    const showModal = () => {
        loginModal.classList.remove('hidden');
        setTimeout(() => {
            loginModal.classList.add('opacity-100');
            modalContent.classList.remove('scale-95', 'opacity-0');
            modalContent.classList.add('scale-100', 'opacity-100');
        }, 10);
    };

    const hideModal = () => {
        modalContent.classList.remove('scale-100', 'opacity-100');
        modalContent.classList.add('scale-95', 'opacity-0');
        loginModal.classList.remove('opacity-100');
        setTimeout(() => loginModal.classList.add('hidden'), 300);
    };

    document.getElementById('admin-main-btn').onclick = showModal;
    document.getElementById('close-login').onclick = hideModal;
    // Cerrar modal al hacer click fuera del contenido
    loginModal.onclick = (e) => { if(e.target === loginModal) hideModal(); };
    
    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        const submitBtn = e.target.querySelector('button[type="submit"]');
        addLoadingState(submitBtn);
        
        const email = document.getElementById('login-email').value.trim();
        const pass = document.getElementById('login-password').value;

        try {
            await signInWithEmailAndPassword(auth, email, pass);
            hideModal();
            e.target.reset();
        } catch (error) { 
            console.error(error);
            alert("Credenciales incorrectas o error de conexión."); 
        } finally { 
            removeLoadingState(submitBtn); 
        }
    };

    document.getElementById('btn-logout').onclick = () => {
        if(confirm("¿Cerrar sesión de administrador?")) signOut(auth);
    };
    
    document.getElementById('filter-category').onchange = renderProducts;

    // Poblar categorías del select admin automáticamente
    const cats = ["Tecnología", "Vehículos", "Hogar", "Ropa", "Servicios", "Otros"];
    document.getElementById('category').innerHTML = `<option value="" disabled selected>Selecciona categoría</option>` + cats.map(c => `<option value="${c}">${c}</option>`).join('');

</script>
</body>
</html>
