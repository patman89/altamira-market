<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altamira Market & Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .product-image-container { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; background-color: #f9fafb; display: flex; align-items: center; justify-content: center; cursor: zoom-in; }
        .product-image-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .news-media { width: 100%; max-height: 250px; object-fit: contain; border-radius: 8px; margin-bottom: 8px; background: #f3f4f6; }
        .hidden { display: none !important; }
        .status-bullet { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        #zoom-modal img, #zoom-modal video { max-width: 95vw; max-height: 70vh; object-fit: contain; border-radius: 8px; outline: none; }
        
        .hero-section {
            position: relative; height: 400px; overflow: hidden; display: flex;
            align-items: center; justify-content: center; color: white;
            text-align: center; margin-bottom: 2rem;
        }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('img/campestre.png');
            background-size: cover; background-position: center;
            filter: brightness(0.6); z-index: -1; transition: transform 0.5s ease;
        }
        .hero-section:hover .hero-bg { transform: scale(1.05); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen antialiased">

    <nav class="bg-white border-b sticky top-0 z-50 py-3 shadow-sm">
        <div class="container mx-auto px-4 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                </div>
                <h1 class="text-xl font-extrabold tracking-tighter text-gray-950">Altamira<span class="text-indigo-600">Market</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <select id="filter-category" class="bg-gray-100 border-none text-xs rounded-full px-4 py-2 outline-none font-medium text-gray-700 cursor-pointer focus:ring-2 focus:ring-indigo-300">
                    <option value="All">Todas las categorías</option>
                    <option value="Tecnología">Tecnología</option>
                    <option value="Vehículos">Vehículos</option>
                    <option value="Hogar">Hogar</option>
                    <option value="Ropa">Ropa</option>
                    <option value="Servicios">Servicios</option>
                    <option value="Otros">Otros</option>
                </select>
                <button id="admin-main-btn" class="bg-gray-950 text-white px-5 py-2 rounded-full text-xs font-semibold hover:bg-gray-800 transition">Admin</button>
            </div>
        </div>
    </nav>

    <header class="hero-section shadow-inner">
        <div class="hero-bg"></div>
        <div class="container mx-auto px-4 relative z-10">
            <h2 class="text-4xl md:text-5xl font-black mb-4 tracking-tighter">Bienvenido a Altamira Campestre</h2>
            <p class="text-lg md:text-xl font-medium text-gray-200 mb-8 max-w-2xl mx-auto">El mercado exclusivo para nuestra comunidad.</p>
            <a href="#catalog-start" class="bg-white text-indigo-600 px-8 py-3 rounded-full font-bold text-sm uppercase tracking-widest hover:bg-indigo-50 transition shadow-lg">Explorar Catálogo</a>
        </div>
    </header>

    <div id="zoom-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[200] flex flex-col items-center justify-center p-4 hidden" onclick="window.closeZoom()">
        <button class="absolute top-5 right-5 text-white text-4xl font-light">&times;</button>
        <div id="zoom-content" class="flex flex-col items-center justify-center w-full max-w-4xl" onclick="event.stopPropagation()">
            </div>
        <div id="zoom-info" class="text-white mt-6 text-center max-w-xl">
            <h3 id="zoom-title" class="font-bold text-2xl mb-2"></h3>
            <p id="zoom-desc" class="text-gray-300 text-lg"></p>
        </div>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-gray-950/80 backdrop-blur-sm z-[110] flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-xs rounded-2xl p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4 text-center">Acceso Administrativo</h3>
            <input type="email" id="login-email" placeholder="Correo" class="w-full p-2 border rounded-lg mb-3 text-sm">
            <input type="password" id="login-pass" placeholder="Contraseña" class="w-full p-2 border rounded-lg mb-4 text-sm">
            <div class="flex gap-2">
                <button id="btn-cancel-login" class="flex-1 py-2 text-xs font-bold text-gray-500 uppercase">Cancelar</button>
                <button id="btn-do-login" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-xs font-bold uppercase">Entrar</button>
            </div>
        </div>
    </div>

    <main id="catalog-start" class="container mx-auto px-4 py-6 flex-grow">
        <section id="admin-panel" class="hidden bg-white border border-gray-100 rounded-2xl p-6 shadow-sm mb-10">
            <div class="flex justify-between items-center mb-6 pb-3 border-b">
                <div class="flex items-center gap-2">
                    <span class="status-bullet bg-indigo-500 animate-pulse"></span>
                    <h2 class="text-sm font-bold text-gray-950 uppercase tracking-tight">Centro de Control</h2>
                </div>
                <button id="btn-logout" class="text-red-500 text-[10px] font-bold uppercase">Cerrar Sesión</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <form id="product-form" class="space-y-3 p-4 bg-gray-50 rounded-xl">
                    <p class="text-[10px] font-bold text-indigo-700 uppercase">Nuevo Producto</p>
                    <input type="text" id="title" placeholder="¿Qué vendes?" class="w-full p-2.5 border rounded-lg text-xs" required>
                    <select id="category" class="w-full p-2.5 border rounded-lg text-xs" required></select>
                    <input type="number" id="price" placeholder="Precio (COP)" class="w-full p-2.5 border rounded-lg text-xs" required>
                    <input type="text" id="contact" placeholder="WhatsApp" class="w-full p-2.5 border rounded-lg text-xs" required>
                    <input type="file" id="image" accept="image/*" class="text-[10px] w-full" required>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-bold text-xs">Publicar</button>
                </form>
                
                <form id="news-form" class="space-y-3 p-4 bg-gray-50 rounded-xl">
                    <p class="text-[10px] font-bold text-orange-700 uppercase">Nuevo Anuncio</p>
                    <input type="text" id="news-title" placeholder="Título" class="w-full p-2.5 border rounded-lg text-xs" required>
                    <textarea id="news-content" placeholder="Mensaje..." class="w-full p-2.5 border rounded-lg text-xs h-20" required></textarea>
                    <input type="file" id="news-image-input" accept="image/*,video/*" class="text-[10px] w-full">
                    <button type="submit" class="w-full bg-orange-500 text-white py-2.5 rounded-lg font-bold text-xs">Enviar</button>
                </form>

                <form id="event-form" class="space-y-3 p-4 bg-gray-50 rounded-xl">
                    <p class="text-[10px] font-bold text-emerald-700 uppercase">Nuevo Evento</p>
                    <input type="text" id="event-name" placeholder="Nombre del Evento" class="w-full p-2.5 border rounded-lg text-xs" required>
                    <input type="date" id="event-date" class="w-full p-2.5 border rounded-lg text-xs" required>
                    <input type="text" id="event-location" placeholder="Lugar" class="w-full p-2.5 border rounded-lg text-xs" required>
                    <button type="submit" class="w-full bg-emerald-600 text-white py-2.5 rounded-lg font-bold text-xs">Agendar</button>
                </form>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3">
                <div class="flex items-center gap-3 mb-6"><span class="status-bullet bg-indigo-500"></span><h2 class="text-xl font-bold text-gray-950">Catálogo</h2></div>
                <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-4"></div>
            </div>
            
            <aside class="lg:col-span-1 space-y-12">
                <div>
                    <div class="flex items-center gap-3 mb-6"><span class="status-bullet bg-orange-500"></span><h2 class="text-xl font-bold text-gray-950">Anuncios</h2></div>
                    <div id="news-feed" class="space-y-4"></div>
                </div>
                <div>
                    <div class="flex items-center gap-3 mb-6"><span class="status-bullet bg-emerald-500"></span><h2 class="text-xl font-bold text-gray-950">Próximos Eventos</h2></div>
                    <div id="event-list" class="space-y-4"></div>
                </div>
            </aside>
        </div>
    </main>

    <footer class="bg-white border-t py-8 mt-12 shadow-inner">
        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4 text-center md:text-left">
            <p class="text-xs text-gray-500">© 2026 Altamira Campestre.</p>
            <div class="flex items-center gap-2 bg-gray-50 px-4 py-2 rounded-full border">
                <span class="status-bullet bg-green-400"></span>
                <span class="text-[10px] font-bold text-gray-400 uppercase">Ventas:</span>
                <span id="stats-count" class="text-lg font-black text-indigo-600">0</span>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, setDoc, increment, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA7eG9w1-M59xqrMsXigc4ABXA_7ArCVjk",
            authDomain: "altamira-market.firebaseapp.com",
            projectId: "altamira-market",
            storageBucket: "altamira-market.firebasestorage.app",
            messagingSenderId: "197188006366",
            appId: "1:197188006366:web:5ef21cc0b63046e39e6d4f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let products = [], news = [], events = [], isAdmin = false;

        // FUNCIÓN MAXIMIZAR REHECHA
        window.openZoom = (src, title, desc = "") => {
            const zoomModal = document.getElementById('zoom-modal');
            const zoomContent = document.getElementById('zoom-content');
            const zoomTitle = document.getElementById('zoom-title');
            const zoomDesc = document.getElementById('zoom-desc');

            zoomContent.innerHTML = "";
            zoomTitle.innerText = title;
            zoomDesc.innerText = desc;

            if (src) {
                const isVideo = src.includes("data:video") || src.match(/\.(mp4|webm|ogg|mov)$/i);
                if (isVideo) {
                    zoomContent.innerHTML = `<video src="${src}" controls autoplay class="shadow-2xl"></video>`;
                } else {
                    zoomContent.innerHTML = `<img src="${src}" class="shadow-2xl">`;
                }
            } else {
                // Caso eventos: Mostrar un icono grande
                zoomContent.innerHTML = `
                    <div class="bg-emerald-600 p-8 rounded-full mb-4">
                        <svg class="w-20 h-20 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>`;
            }

            zoomModal.classList.remove('hidden');
        };

        window.closeZoom = () => document.getElementById('zoom-modal').classList.add('hidden');

        const loginModal = document.getElementById('login-modal');
        document.getElementById('admin-main-btn').onclick = () => loginModal.classList.remove('hidden');
        document.getElementById('btn-cancel-login').onclick = () => loginModal.classList.add('hidden');
        document.getElementById('btn-do-login').onclick = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); loginModal.classList.add('hidden'); } 
            catch (e) { alert("Error"); }
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    if (file.type.startsWith('video/')) return resolve(e.target.result);
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 800; canvas.height = (img.height * 800) / img.width;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        };

        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.getElementById('admin-panel').classList.toggle('hidden', !isAdmin);
            document.getElementById('admin-main-btn').classList.toggle('hidden', isAdmin);
            renderAll();
        });

        const renderAll = () => { renderProducts(); renderNews(); renderEvents(); };

        onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), (snap) => {
            products = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderProducts();
        });
        onSnapshot(query(collection(db, "news"), orderBy("date", "desc")), (snap) => {
            news = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderNews();
        });
        onSnapshot(query(collection(db, "events"), orderBy("eventDate", "asc")), (snap) => {
            events = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderEvents();
        });
        onSnapshot(doc(db, "stats", "global"), (d) => {
            if(d.exists()) document.getElementById('stats-count').innerText = d.data().salesCount || 0;
        });

        function renderProducts() {
            const filter = document.getElementById('filter-category').value;
            const filtered = filter === "All" ? products : products.filter(p => p.category === filter);
            document.getElementById('product-grid').innerHTML = filtered.map(p => `
                <div class="bg-white rounded-xl border border-gray-200 overflow-hidden flex flex-col">
                    <div class="product-image-container" onclick="window.openZoom('${p.image}', '${p.title}', '$${parseInt(p.price).toLocaleString()}')">
                        <img src="${p.image}">
                    </div>
                    <div class="p-3">
                        <h3 class="text-[12px] font-medium text-gray-500 truncate">${p.title}</h3>
                        <p class="text-[15px] font-bold mb-3">$${parseInt(p.price).toLocaleString()}</p>
                        <a href="https://wa.me/${p.contact}" target="_blank" class="bg-green-500 text-white text-center py-2 rounded-lg text-[11px] font-bold block">WhatsApp</a>
                        ${isAdmin ? `<button onclick="window.adminDelete('${p.id}')" class="text-red-500 text-[8px] mt-2 w-full font-bold">GESTIONAR</button>` : ''}
                    </div>
                </div>`).join('');
        }

        function renderNews() {
            document.getElementById('news-feed').innerHTML = news.map(n => `
                <div class="bg-white p-4 rounded-xl border border-gray-100 relative shadow-sm">
                    ${n.image ? `<img src="${n.image}" class="news-media cursor-pointer" onclick="window.openZoom('${n.image}', '${n.title}', '${n.content}')">` : ''}
                    <h4 class="font-bold text-[11px] uppercase">${n.title}</h4>
                    <p class="text-[10px] text-gray-500">${n.content}</p>
                    ${isAdmin ? `<button onclick="window.deleteNews('${n.id}')" class="absolute top-1 right-1 text-gray-300">&times;</button>` : ''}
                </div>`).join('');
        }

        function renderEvents() {
            document.getElementById('event-list').innerHTML = events.map(e => {
                const date = new Date(e.eventDate + "T00:00:00");
                const day = date.getDate();
                const month = date.toLocaleString('es-CO', {month: 'short'}).toUpperCase();
                const fullDate = date.toLocaleDateString('es-CO', { weekday: 'long', day: 'numeric', month: 'long' });
                
                return `
                <div class="bg-white p-3 rounded-xl border border-gray-100 flex items-center gap-3 relative shadow-sm cursor-pointer hover:bg-gray-50" 
                     onclick="window.openZoom('', '${e.name}', '📅 ${fullDate} \\n 📍 ${e.location}')">
                    <div class="bg-emerald-600 text-white min-w-[40px] h-[40px] rounded-lg flex flex-col items-center justify-center">
                        <span class="text-sm font-bold leading-none">${day}</span>
                        <span class="text-[8px] font-bold">${month}</span>
                    </div>
                    <div class="overflow-hidden">
                        <h4 class="font-bold text-[10px] truncate uppercase">${e.name}</h4>
                        <p class="text-[8px] text-emerald-700 truncate">📍 ${e.location}</p>
                    </div>
                    ${isAdmin ? `<button onclick="event.stopPropagation(); window.deleteEvent('${e.id}')" class="absolute top-1 right-1 text-gray-300">&times;</button>` : ''}
                </div>`;
            }).join('');
        }

        window.adminDelete = async (id) => {
            const r = prompt("1. VENDIDO | 2. ELIMINAR");
            if (r === "1") { await setDoc(doc(db, "stats", "global"), { salesCount: increment(1) }, { merge: true }); await deleteDoc(doc(db, "products", id)); }
            else if (r === "2") await deleteDoc(doc(db, "products", id));
        };
        window.deleteNews = async (id) => { if(confirm("¿Eliminar?")) await deleteDoc(doc(db, "news", id)); };
        window.deleteEvent = async (id) => { if(confirm("¿Eliminar?")) await deleteDoc(doc(db, "events", id)); };

        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            const img = await compressImage(document.getElementById('image').files[0]);
            await addDoc(collection(db, "products"), {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                price: document.getElementById('price').value,
                contact: document.getElementById('contact').value,
                image: img, date: Date.now()
            });
            e.target.reset();
        };

        document.getElementById('news-form').onsubmit = async (e) => {
            e.preventDefault();
            let img = document.getElementById('news-image-input').files[0] ? await compressImage(document.getElementById('news-image-input').files[0]) : null;
            await addDoc(collection(db, "news"), {
                title: document.getElementById('news-title').value,
                content: document.getElementById('news-content').value,
                image: img, date: Date.now()
            });
            e.target.reset();
        };

        document.getElementById('event-form').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "events"), {
                name: document.getElementById('event-name').value,
                eventDate: document.getElementById('event-date').value,
                location: document.getElementById('event-location').value
            });
            e.target.reset();
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);
        document.getElementById('filter-category').onchange = renderProducts;
        const cats = ["Tecnología", "Vehículos", "Hogar", "Ropa", "Servicios", "Otros"];
        document.getElementById('category').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
    </script>
</body>
</html>
