<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altamira Market & Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .product-card img { height: 180px; object-fit: cover; width: 100%; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hidden { display: none !important; }
        input, select, textarea { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <nav class="bg-white border-b sticky top-0 z-50 py-4">
        <div class="container mx-auto px-4 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                </div>
                <h1 class="text-xl font-extrabold tracking-tight text-gray-900 uppercase">Altamira<span class="text-indigo-600">Market</span></h1>
            </div>
            
            <div class="flex items-center gap-4">
                <select id="filter-category" class="bg-gray-100 border-none text-sm rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="All">Todas las categorías</option>
                    <option value="Tecnología">Tecnología</option>
                    <option value="Vehículos">Vehículos</option>
                    <option value="Hogar">Hogar</option>
                    <option value="Ropa">Ropa</option>
                    <option value="Servicios">Servicios</option>
                    <option value="Otros">Otros</option>
                </select>
                <button id="admin-main-btn" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-800 transition">Admin</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 flex-grow">
        
        <section id="admin-panel" class="hidden bg-white border rounded-2xl p-6 shadow-sm mb-12">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-extrabold uppercase tracking-wider text-indigo-600">Centro de Control</h2>
                <button id="btn-logout" class="text-red-500 text-xs font-bold hover:underline">Cerrar Sesión</button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <form id="product-form" class="space-y-3 p-4 bg-gray-50 rounded-xl">
                    <p class="text-xs font-extrabold text-gray-400 uppercase mb-2">Nuevo Producto</p>
                    <input type="text" id="title" placeholder="Nombre del producto" class="w-full p-2.5 border rounded-lg text-sm" required>
                    <select id="category" class="w-full p-2.5 border rounded-lg text-sm" required></select>
                    <input type="number" id="price" placeholder="Precio (COP)" class="w-full p-2.5 border rounded-lg text-sm" required>
                    <input type="text" id="contact" placeholder="WhatsApp" class="w-full p-2.5 border rounded-lg text-sm" required>
                    <input type="file" id="image" accept="image/*" class="text-xs w-full" required>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg text-sm font-bold">Publicar</button>
                </form>

                <form id="news-form" class="space-y-3 p-4 bg-gray-50 rounded-xl">
                    <p class="text-xs font-extrabold text-gray-400 uppercase mb-2">Nuevo Anuncio</p>
                    <input type="text" id="news-title" placeholder="Título" class="w-full p-2.5 border rounded-lg text-sm" required>
                    <textarea id="news-content" placeholder="Mensaje..." class="w-full p-2.5 border rounded-lg text-sm h-24" required></textarea>
                    <button type="submit" class="w-full bg-orange-500 text-white py-2.5 rounded-lg text-sm font-bold">Enviar al Blog</button>
                </form>

                <form id="event-form" class="space-y-3 p-4 bg-gray-50 rounded-xl">
                    <p class="text-xs font-extrabold text-gray-400 uppercase mb-2">Nuevo Evento</p>
                    <input type="text" id="event-name" placeholder="Evento" class="w-full p-2.5 border rounded-lg text-sm" required>
                    <input type="date" id="event-date" class="w-full p-2.5 border rounded-lg text-sm" required>
                    <input type="text" id="event-location" placeholder="Ubicación" class="w-full p-2.5 border rounded-lg text-sm" required>
                    <button type="submit" class="w-full bg-emerald-600 text-white py-2.5 rounded-lg text-sm font-bold">Agendar</button>
                </form>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3">
                <h2 class="text-2xl font-extrabold text-gray-900 mb-6 uppercase tracking-tight">Catálogo de Productos</h2>
                <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
            </div>
            
            <div class="lg:col-span-1">
                <h2 class="text-2xl font-extrabold text-gray-900 mb-6 uppercase tracking-tight">Anuncios</h2>
                <div id="news-feed" class="space-y-4"></div>
            </div>
        </div>

        <section class="mt-20">
            <h2 class="text-2xl font-extrabold text-gray-900 mb-8 uppercase tracking-tight text-center lg:text-left">Calendario de Eventos</h2>
            <div id="event-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>

    </main>

    <footer class="bg-white border-t py-6 mt-12">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <p class="text-xs text-gray-400 font-medium">© 2026 Altamira Campestre</p>
            <div class="flex items-center gap-2">
                <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Ventas Confirmadas:</span>
                <span id="stats-count" class="text-lg font-extrabold text-indigo-600">0</span>
            </div>
        </div>
    </footer>

    <div id="login-modal" class="fixed inset-0 bg-gray-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-2xl p-8 shadow-2xl">
            <h3 class="text-xl font-extrabold mb-6 text-center uppercase tracking-tighter">Acceso de Administrador</h3>
            <form id="login-form" class="space-y-4">
                <input type="email" id="login-email" placeholder="Correo" class="w-full p-3 border rounded-xl text-sm" required>
                <input type="password" id="login-password" placeholder="Contraseña" class="w-full p-3 border rounded-xl text-sm" required>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-extrabold text-sm uppercase tracking-widest">Ingresar</button>
                <button type="button" id="close-login" class="w-full text-xs text-gray-400 font-bold uppercase mt-2">Cancelar</button>
            </form>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, setDoc, increment, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7eG9w1-M59xqrMsXigc4ABXA_7ArCVjk",
        authDomain: "altamira-market.firebaseapp.com",
        projectId: "altamira-market",
        storageBucket: "altamira-market.firebasestorage.app",
        messagingSenderId: "197188006366",
        appId: "1:197188006366:web:5ef21cc0b63046e39e6d4f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let products = [], news = [], events = [], isAdmin = false;

    // --- SINCRONIZACIÓN DE INTERFAZ ---
    onAuthStateChanged(auth, (user) => {
        isAdmin = !!user;
        document.getElementById('admin-panel').classList.toggle('hidden', !isAdmin);
        document.getElementById('admin-main-btn').classList.toggle('hidden', isAdmin);
        renderAll();
    });

    const renderAll = () => { renderProducts(); renderNews(); renderEvents(); };

    // --- CARGA DE DATOS ---
    onSnapshot(collection(db, "products"), (snap) => {
        products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderProducts();
    });

    onSnapshot(collection(db, "news"), (snap) => {
        news = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderNews();
    });

    onSnapshot(query(collection(db, "events"), orderBy("eventDate", "asc")), (snap) => {
        events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderEvents();
    });

    onSnapshot(doc(db, "stats", "global"), (d) => {
        if(d.exists()) document.getElementById('stats-count').innerText = d.data().salesCount || 0;
    });

    // --- RENDERIZADO UNIFICADO ---
    function renderProducts() {
        const filter = document.getElementById('filter-category').value;
        const filtered = filter === "All" ? products : products.filter(p => p.category === filter);
        document.getElementById('product-grid').innerHTML = filtered.map(p => `
            <div class="bg-white rounded-2xl border overflow-hidden transition hover:shadow-lg">
                <img src="${p.image}" class="product-card img">
                <div class="p-5">
                    <p class="text-xl font-extrabold text-gray-900 mb-1">$${parseInt(p.price).toLocaleString()}</p>
                    <h3 class="text-sm font-medium text-gray-500 line-clamp-2 mb-4 h-10">${p.title}</h3>
                    <div class="flex flex-col gap-2">
                        <a href="https://wa.me/${p.contact}" target="_blank" class="bg-green-500 text-white text-center py-2.5 rounded-lg text-xs font-extrabold uppercase tracking-widest">Contactar</a>
                        ${isAdmin ? `<button onclick="window.adminDelete('${p.id}')" class="text-red-500 text-[10px] font-extrabold uppercase">Gestionar</button>` : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderNews() {
        document.getElementById('news-feed').innerHTML = news.map(n => `
            <div class="bg-white p-5 rounded-2xl border border-orange-100 shadow-sm">
                <h4 class="font-extrabold text-sm text-gray-900 mb-2">${n.title}</h4>
                <p class="text-xs text-gray-600 leading-relaxed">${n.content}</p>
                ${isAdmin ? `<button onclick="window.deleteNews('${n.id}')" class="text-red-300 text-[9px] font-bold mt-4 uppercase">Eliminar</button>` : ''}
            </div>
        `).join('');
    }

    function renderEvents() {
        document.getElementById('event-list').innerHTML = events.map(e => {
            const date = new Date(e.eventDate + "T00:00:00");
            return `
                <div class="bg-white p-5 rounded-2xl border border-emerald-100 flex items-center gap-4 relative">
                    <div class="bg-emerald-600 text-white min-w-[55px] h-[55px] rounded-xl flex flex-col items-center justify-center">
                        <span class="text-xl font-extrabold leading-none">${date.getDate()}</span>
                        <span class="text-[9px] font-bold uppercase">${date.toLocaleString('es', {month: 'short'})}</span>
                    </div>
                    <div>
                        <h4 class="font-extrabold text-sm text-gray-900 leading-tight">${e.name}</h4>
                        <p class="text-[11px] font-semibold text-emerald-600 mt-1 uppercase">📍 ${e.location}</p>
                    </div>
                    ${isAdmin ? `<button onclick="window.deleteEvent('${e.id}')" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 text-xl font-light">&times;</button>` : ''}
                </div>
            `;
        }).join('');
    }

    // --- ACCIONES ---
    window.adminDelete = async (id) => {
        const r = prompt("1. VENDIDO | 2. ELIMINAR | 3. CANCELAR");
        if (r === "1") {
            await setDoc(doc(db, "stats", "global"), { salesCount: increment(1) }, { merge: true });
            await deleteDoc(doc(db, "products", id));
        } else if (r === "2") await deleteDoc(doc(db, "products", id));
    };

    window.deleteNews = async (id) => { if(confirm("¿Borrar noticia?")) await deleteDoc(doc(db, "news", id)); };
    window.deleteEvent = async (id) => { if(confirm("¿Borrar evento?")) await deleteDoc(doc(db, "events", id)); };

    // --- FORMS ---
    document.getElementById('product-form').onsubmit = async (e) => {
        e.preventDefault();
        const reader = new FileReader();
        reader.onloadend = async () => {
            await addDoc(collection(db, "products"), {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                price: document.getElementById('price').value,
                contact: document.getElementById('contact').value,
                image: reader.result,
                date: Date.now()
            });
            e.target.reset();
        };
        reader.readAsDataURL(document.getElementById('image').files[0]);
    };

    document.getElementById('news-form').onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "news"), {
            title: document.getElementById('news-title').value,
            content: document.getElementById('news-content').value,
            date: Date.now()
        });
        e.target.reset();
    };

    document.getElementById('event-form').onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "events"), {
            name: document.getElementById('event-name').value,
            eventDate: document.getElementById('event-date').value,
            location: document.getElementById('event-location').value
        });
        e.target.reset();
    };

    // --- MODAL & LOGOUT ---
    document.getElementById('admin-main-btn').onclick = () => document.getElementById('login-modal').classList.remove('hidden');
    document.getElementById('close-login').onclick = () => document.getElementById('login-modal').classList.add('hidden');
    document.getElementById('btn-logout').onclick = () => signOut(auth);
    
    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        try {
            await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
            document.getElementById('login-modal').classList.add('hidden');
            e.target.reset();
        } catch (error) { alert("Acceso Denegado"); }
    };

    document.getElementById('filter-category').onchange = renderProducts;

    // Poblar categorías del select admin automáticamente
    const cats = ["Tecnología", "Vehículos", "Hogar", "Ropa", "Servicios", "Otros"];
    document.getElementById('category').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');

</script>
</body>
</html>
