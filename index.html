<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altamira Market & Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .product-image-container { position: relative; width: 100%; height: 180px; overflow: hidden; background-color: #f9fafb; display: flex; align-items: center; justify-content: center; }
        .product-image-container img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.3s ease; }
        .product-card:hover img { transform: scale(1.05); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hidden { display: none !important; }
        .status-bullet { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen antialiased">

    <nav class="bg-white border-b sticky top-0 z-50 py-3 shadow-sm">
        <div class="container mx-auto px-4 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                </div>
                <h1 class="text-xl font-extrabold tracking-tighter text-gray-950">Altamira<span class="text-indigo-600">Market</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <select id="filter-category" class="bg-gray-100 border-none text-xs rounded-full px-4 py-2 outline-none font-medium text-gray-700 cursor-pointer focus:ring-2 focus:ring-indigo-300">
                    <option value="All">Todas las categorías</option>
                    <option value="Tecnología">Tecnología</option>
                    <option value="Vehículos">Vehículos</option>
                    <option value="Hogar">Hogar</option>
                    <option value="Ropa">Ropa</option>
                    <option value="Servicios">Servicios</option>
                    <option value="Otros">Otros</option>
                </select>
                <button id="admin-main-btn" class="bg-gray-950 text-white px-5 py-2 rounded-full text-xs font-semibold hover:bg-gray-800 transition">Admin</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 flex-grow">
        <section id="admin-panel" class="hidden bg-white border border-gray-100 rounded-2xl p-6 shadow-sm mb-10">
            <div class="flex justify-between items-center mb-6 pb-3 border-b">
                <div class="flex items-center gap-2">
                    <span class="status-bullet bg-indigo-500 animate-pulse"></span>
                    <h2 class="text-sm font-bold text-gray-950 uppercase tracking-tight">Centro de Control</h2>
                </div>
                <button id="btn-logout" class="text-red-500 text-[10px] font-bold uppercase">Cerrar Sesión</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <form id="product-form" class="space-y-3 p-4 bg-gray-50 rounded-xl">
                    <p class="text-[10px] font-bold text-indigo-700 uppercase">Nuevo Producto</p>
                    <input type="text" id="title" placeholder="¿Qué vendes?" class="w-full p-2.5 border rounded-lg text-xs" required>
                    <select id="category" class="w-full p-2.5 border rounded-lg text-xs" required></select>
                    <input type="number" id="price" placeholder="Precio (COP)" class="w-full p-2.5 border rounded-lg text-xs" required>
                    <input type="text" id="contact" placeholder="WhatsApp" class="w-full p-2.5 border rounded-lg text-xs" required>
                    <input type="file" id="image" accept="image/*" class="text-[10px] w-full" required>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-bold text-xs">Publicar</button>
                </form>
                <form id="news-form" class="space-y-3 p-4 bg-gray-50 rounded-xl">
                    <p class="text-[10px] font-bold text-orange-700 uppercase">Nuevo Anuncio</p>
                    <input type="text" id="news-title" placeholder="Título" class="w-full p-2.5 border rounded-lg text-xs" required>
                    <textarea id="news-content" placeholder="Mensaje..." class="w-full p-2.5 border rounded-lg text-xs h-20" required></textarea>
                    <button type="submit" class="w-full bg-orange-500 text-white py-2.5 rounded-lg font-bold text-xs">Enviar</button>
                </form>
                <form id="event-form" class="space-y-3 p-4 bg-gray-50 rounded-xl">
                    <p class="text-[10px] font-bold text-emerald-700 uppercase">Nuevo Evento</p>
                    <input type="text" id="event-name" placeholder="Evento" class="w-full p-2.5 border rounded-lg text-xs" required>
                    <input type="date" id="event-date" class="w-full p-2.5 border rounded-lg text-xs" required>
                    <input type="text" id="event-location" placeholder="Lugar" class="w-full p-2.5 border rounded-lg text-xs" required>
                    <button type="submit" class="w-full bg-emerald-600 text-white py-2.5 rounded-lg font-bold text-xs">Agendar</button>
                </form>
            </div>
        </section>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-8">
            <div class="xl:col-span-3">
                <div class="flex items-center gap-3 mb-6"><span class="status-bullet bg-indigo-500"></span><h2 class="text-xl font-bold text-gray-950">Catálogo</h2></div>
                <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
            </div>
            
            <div class="xl:col-span-1 border-t pt-8 xl:border-t-0 xl:pt-0 xl:border-l xl:pl-8">
                <div class="flex items-center gap-3 mb-6"><span class="status-bullet bg-orange-500"></span><h2 class="text-xl font-bold text-gray-950">Anuncios</h2></div>
                <div id="news-feed" class="space-y-4"></div>
            </div>
        </div>

        <section class="mt-16 pt-8 border-t">
            <div class="flex items-center gap-3 mb-6"><span class="status-bullet bg-emerald-500"></span><h2 class="text-xl font-bold text-gray-950">Eventos</h2></div>
            <div id="event-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </section>
    </main>

    <footer class="bg-white border-t py-8 mt-12 shadow-inner">
        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4 text-center md:text-left">
            <div>
                <p class="text-xs text-gray-500">© 2026 Altamira Campestre.</p>
                <button id="btn-legal" class="text-indigo-600 text-[10px] font-bold hover:underline mt-1 uppercase tracking-widest">Politicas & Privacidad</button>
            </div>
            <div class="flex items-center gap-2 bg-gray-50 px-4 py-2 rounded-full border">
                <span class="status-bullet bg-green-400"></span>
                <span class="text-[9px] font-bold text-gray-400 uppercase">Ventas:</span>
                <span id="stats-count" class="text-lg font-black text-indigo-600">0</span>
            </div>
        </div>
    </footer>

    <div id="legal-modal" class="fixed inset-0 bg-gray-950/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-2xl rounded-3xl p-8 shadow-2xl max-h-[85vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-xl font-extrabold text-gray-950 uppercase tracking-tighter">Aviso Legal</h3>
                <button id="close-legal" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <p class="text-xs text-gray-600">Contenido legal aquí...</p>
        </div>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-gray-950/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-2xl p-8 shadow-2xl text-center">
            <h3 class="text-lg font-bold mb-6 uppercase">Acceso Admin</h3>
            <form id="login-form" class="space-y-4">
                <input type="email" id="login-email" placeholder="Correo" class="w-full p-3 border rounded-xl text-xs" required>
                <input type="password" id="login-password" placeholder="Contraseña" class="w-full p-3 border rounded-xl text-xs" required>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-xs">Entrar</button>
                <button type="button" id="close-login" class="text-[10px] text-gray-400 font-bold uppercase mt-2">Cerrar</button>
            </form>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, setDoc, increment, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7eG9w1-M59xqrMsXigc4ABXA_7ArCVjk",
        authDomain: "altamira-market.firebaseapp.com",
        projectId: "altamira-market",
        storageBucket: "altamira-market.firebasestorage.app",
        messagingSenderId: "197188006366",
        appId: "1:197188006366:web:5ef21cc0b63046e39e6d4f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let products = [], news = [], events = [], isAdmin = false;

    // UI Helpers
    const toggleModal = (id, show) => document.getElementById(id).classList.toggle('hidden', !show);
    document.getElementById('btn-legal').onclick = () => toggleModal('legal-modal', true);
    document.getElementById('close-legal').onclick = () => toggleModal('legal-modal', false);
    document.getElementById('admin-main-btn').onclick = () => toggleModal('login-modal', true);
    document.getElementById('close-login').onclick = () => toggleModal('login-modal', false);

    // Auth state
    onAuthStateChanged(auth, (user) => {
        isAdmin = !!user;
        document.getElementById('admin-panel').classList.toggle('hidden', !isAdmin);
        document.getElementById('admin-main-btn').classList.toggle('hidden', isAdmin);
        renderAll();
    });

    const renderAll = () => { renderProducts(); renderNews(); renderEvents(); };

    // Listeners de Firestore
    onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), (snap) => {
        products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderProducts();
    });

    onSnapshot(query(collection(db, "news"), orderBy("date", "desc")), (snap) => {
        news = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderNews();
    });

    onSnapshot(query(collection(db, "events"), orderBy("eventDate", "asc")), (snap) => {
        events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderEvents();
    });

    onSnapshot(doc(db, "stats", "global"), (d) => {
        if(d.exists()) document.getElementById('stats-count').innerText = d.data().salesCount || 0;
    });

    // Renderizado de funciones
    function renderProducts() {
        const filter = document.getElementById('filter-category').value;
        const filtered = filter === "All" ? products : products.filter(p => p.category === filter);
        document.getElementById('product-grid').innerHTML = filtered.map(p => `
            <div class="product-card bg-white rounded-xl border border-gray-100 overflow-hidden hover:shadow-lg transition flex flex-col">
                <div class="product-image-container"><img src="${p.image}" loading="lazy"></div>
                <div class="p-3">
                    <p class="text-[13px] font-bold text-gray-950 mb-0.5">$${parseInt(p.price).toLocaleString('es-CO')}</p>
                    <h3 class="text-[11px] font-medium text-gray-600 line-clamp-1 mb-3">${p.title}</h3>
                    <a href="https://wa.me/${p.contact}" target="_blank" class="bg-green-500 text-white text-center py-2 rounded-lg text-[10px] font-bold uppercase block hover:bg-green-600 transition">Contactar</a>
                    ${isAdmin ? `<button onclick="window.adminDelete('${p.id}')" class="text-red-500 text-[8px] font-bold uppercase mt-2 w-full">Gestionar</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function renderNews() {
        document.getElementById('news-feed').innerHTML = news.map(n => `
            <div class="bg-white p-4 rounded-xl border border-gray-100 relative">
                <div class="absolute top-0 left-0 w-1 h-full bg-orange-400"></div>
                <h4 class="font-bold text-[11px] text-gray-950 mb-1 uppercase">${n.title}</h4>
                <p class="text-[10px] text-gray-500 leading-tight">${n.content}</p>
                ${isAdmin ? `<button onclick="window.deleteNews('${n.id}')" class="absolute top-1 right-1 text-gray-300 font-bold hover:text-red-500">×</button>` : ''}
            </div>
        `).join('');
    }

    function renderEvents() {
        document.getElementById('event-list').innerHTML = events.map(e => {
            const date = new Date(e.eventDate + "T00:00:00");
            return `
                <div class="bg-white p-3 rounded-xl border border-gray-100 flex items-center gap-3 relative">
                    <div class="bg-emerald-600 text-white min-w-[40px] h-[40px] rounded-lg flex flex-col items-center justify-center">
                        <span class="text-sm font-bold leading-none">${date.getDate()}</span>
                        <span class="text-[8px] font-bold uppercase">${date.toLocaleString('es-CO', {month: 'short'}).replace('.','')}</span>
                    </div>
                    <div>
                        <h4 class="font-bold text-[10px] text-gray-950 leading-tight">${e.name}</h4>
                        <p class="text-[8px] text-emerald-700 uppercase">📍 ${e.location}</p>
                    </div>
                    ${isAdmin ? `<button onclick="window.deleteEvent('${e.id}')" class="absolute top-1 right-1 text-gray-300 font-bold hover:text-red-500">×</button>` : ''}
                </div>
            `;
        }).join('');
    }

    // Funciones globales para botones onClick
    window.adminDelete = async (id) => {
        const r = prompt("1. VENDIDO | 2. ELIMINAR | 3. CANCELAR");
        if (r === "1") {
            await setDoc(doc(db, "stats", "global"), { salesCount: increment(1) }, { merge: true });
            await deleteDoc(doc(db, "products", id));
        } else if (r === "2") await deleteDoc(doc(db, "products", id));
    };

    window.deleteNews = async (id) => { if(confirm("¿Eliminar anuncio?")) await deleteDoc(doc(db, "news", id)); };
    window.deleteEvent = async (id) => { if(confirm("¿Eliminar evento?")) await deleteDoc(doc(db, "events", id)); };

    // Envío de formularios
