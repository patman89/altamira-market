<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altamira Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Estilo Marketplace Compacto */
        .product-image-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 1 / 1; /* Imagen cuadrada */
            overflow: hidden; 
            background-color: #f3f4f6; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-image-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Llena el espacio como en FB */
            transition: transform 0.3s ease; 
        }
        .product-card:hover img { transform: scale(1.03); }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .hidden { display: none !important; }
        .status-bullet { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen antialiased">

    <nav class="bg-white border-b sticky top-0 z-50 py-2 shadow-sm">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-lg font-extrabold tracking-tighter text-gray-950">Altamira<span class="text-indigo-600">Market</span></h1>
            <div class="flex items-center gap-2">
                <select id="filter-category" class="bg-gray-100 border-none text-[11px] rounded-full px-3 py-1.5 outline-none font-semibold text-gray-700">
                    <option value="All">Todo</option>
                    <option value="Tecnología">Tecnología</option>
                    <option value="Vehículos">Vehículos</option>
                    <option value="Hogar">Hogar</option>
                    <option value="Ropa">Ropa</option>
                    <option value="Servicios">Servicios</option>
                    <option value="Otros">Otros</option>
                </select>
                <button id="admin-main-btn" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full text-[11px] font-bold">Admin</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-2 py-4 flex-grow">
        <section id="admin-panel" class="hidden bg-white rounded-xl p-4 shadow-sm mb-6 border">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-bold uppercase">Panel de Control</h2>
                <button id="btn-logout" class="text-red-500 text-[10px] font-bold">Cerrar Sesión</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <form id="product-form" class="space-y-2">
                    <input type="text" id="title" placeholder="Producto" class="w-full p-2 border rounded text-xs" required>
                    <select id="category" class="w-full p-2 border rounded text-xs" required></select>
                    <input type="number" id="price" placeholder="Precio" class="w-full p-2 border rounded text-xs" required>
                    <input type="text" id="contact" placeholder="WhatsApp (ej: 57300...)" class="w-full p-2 border rounded text-xs" required>
                    <input type="file" id="image" accept="image/*" class="text-[10px]" required>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded font-bold text-xs">Publicar</button>
                </form>
                <form id="news-form" class="space-y-2">
                    <input type="text" id="news-title" placeholder="Título Noticia" class="w-full p-2 border rounded text-xs" required>
                    <textarea id="news-content" placeholder="Contenido" class="w-full p-2 border rounded text-xs h-16" required></textarea>
                    <button type="submit" class="w-full bg-orange-500 text-white py-2 rounded font-bold text-xs">Anunciar</button>
                </form>
                <form id="event-form" class="space-y-2">
                    <input type="text" id="event-name" placeholder="Evento" class="w-full p-2 border rounded text-xs" required>
                    <input type="date" id="event-date" class="w-full p-2 border rounded text-xs" required>
                    <input type="text" id="event-location" placeholder="Lugar" class="w-full p-2 border rounded text-xs" required>
                    <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded font-bold text-xs">Agendar</button>
                </form>
            </div>
        </section>

        <div class="flex flex-col lg:flex-row gap-6">
            <div class="flex-grow">
                <h2 class="text-sm font-bold mb-4 px-2">Sugerencias de hoy</h2>
                <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-2">
                    </div>
            </div>

            <div class="w-full lg:w-72 space-y-4">
                <h2 class="text-sm font-bold px-2">Noticias del Conjunto</h2>
                <div id="news-feed" class="space-y-3 px-2"></div>
            </div>
        </div>

        <section class="mt-10 border-t pt-6">
            <h2 class="text-sm font-bold mb-4 px-2">Próximos Eventos</h2>
            <div id="event-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 px-2"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, setDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA7eG9w1-M59xqrMsXigc4ABXA_7ArCVjk",
            authDomain: "altamira-market.firebaseapp.com",
            projectId: "altamira-market",
            storageBucket: "altamira-market.firebasestorage.app",
            messagingSenderId: "197188006366",
            appId: "1:197188006366:web:5ef21cc0b63046e39e6d4f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let products = [], news = [], events = [], isAdmin = false;

        // Auth
        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.getElementById('admin-panel').classList.toggle('hidden', !isAdmin);
            document.getElementById('admin-main-btn').classList.toggle('hidden', isAdmin);
            renderAll();
        });

        const renderAll = () => { renderProducts(); renderNews(); renderEvents(); };

        // Realtime Data
        onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), (snap) => {
            products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderProducts();
        });

        onSnapshot(query(collection(db, "news"), orderBy("date", "desc")), (snap) => {
            news = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderNews();
        });

        onSnapshot(query(collection(db, "events"), orderBy("eventDate", "asc")), (snap) => {
            events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderEvents();
        });

        // FUNCION RENDER PRODUCTOS ESTILO MARKETPLACE
        function renderProducts() {
            const filter = document.getElementById('filter-category').value;
            const filtered = filter === "All" ? products : products.filter(p => p.category === filter);
            
            document.getElementById('product-grid').innerHTML = filtered.map(p => `
                <div class="product-card bg-white rounded-lg overflow-hidden shadow-sm hover:shadow-md transition flex flex-col border border-gray-200">
                    <div class="product-image-container">
                        <img src="${p.image}" loading="lazy">
                    </div>
                    <div class="p-2 flex flex-col flex-grow">
                        <h3 class="text-[13px] font-normal text-gray-800 line-clamp-1 order-1">${p.title}</h3>
                        <p class="text-[15px] font-bold text-gray-900 mb-2 order-2">$${parseInt(p.price).toLocaleString('es-CO')}</p>
                        
                        <a href="https://wa.me/${p.contact}" target="_blank" 
                           class="mt-auto bg-green-500 text-white text-center py-1.5 rounded-md text-[11px] font-bold uppercase flex items-center justify-center gap-1 hover:bg-green-600 order-3">
                           <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.94 3.674 1.436 5.662 1.436h.008c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                           WhatsApp
                        </a>
                        
                        ${isAdmin ? `<button onclick="window.adminDelete('${p.id}')" class="text-red-500 text-[9px] font-bold uppercase mt-2">Gestionar</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Render Noticias
        function renderNews() {
            document.getElementById('news-feed').innerHTML = news.map(n => `
                <div class="bg-white p-3 rounded-lg border border-gray-200 relative shadow-sm">
                    <h4 class="font-bold text-[11px] text-indigo-600 uppercase mb-1">${n.title}</h4>
                    <p class="text-[11px] text-gray-600 leading-snug">${n.content}</p>
                    ${isAdmin ? `<button onclick="window.deleteNews('${n.id}')" class="absolute top-1 right-1 text-gray-300">×</button>` : ''}
                </div>
            `).join('');
        }

        // Render Eventos
        function renderEvents() {
            document.getElementById('event-list').innerHTML = events.map(e => {
                const date = new Date(e.eventDate + "T00:00:00");
                return `
                    <div class="bg-white p-3 rounded-lg border border-gray-200 flex items-center gap-3 relative shadow-sm">
                        <div class="bg-indigo-100 text-indigo-700 min-w-[45px] h-[45px] rounded flex flex-col items-center justify-center">
                            <span class="text-sm font-black">${date.getDate()}</span>
                            <span class="text-[8px] font-bold uppercase">${date.toLocaleString('es-CO', {month: 'short'})}</span>
                        </div>
                        <div class="overflow-hidden">
                            <h4 class="font-bold text-[11px] text-gray-900 truncate">${e.name}</h4>
                            <p class="text-[10px] text-gray-500">📍 ${e.location}</p>
                        </div>
                        ${isAdmin ? `<button onclick="window.deleteEvent('${e.id}')" class="absolute top-1 right-1 text-gray-300">×</button>` : ''}
                    </div>
                `;
            }).join('');
        }

        // Funciones Globales para Borrar
        window.adminDelete = async (id) => {
            const r = prompt("1. VENDIDO | 2. ELIMINAR | 3. CANCELAR");
            if (r === "1") {
                await setDoc(doc(db, "stats", "global"), { salesCount: increment(1) }, { merge: true });
                await deleteDoc(doc(db, "products", id));
            } else if (r === "2") await deleteDoc(doc(db, "products", id));
        };
        window.deleteNews = async (id) => { if(confirm("¿Borrar?")) await deleteDoc(doc(db, "news", id)); };
        window.deleteEvent = async (id) => { if(confirm("¿Borrar?")) await deleteDoc(doc(db, "events", id)); };

        // Formularios
        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            const reader = new FileReader();
            reader.onloadend = async () => {
                await addDoc(collection(db, "products"), {
                    title: document.getElementById('title').value,
                    category: document.getElementById('category').value,
                    price: document.getElementById('price').value,
                    contact: document.getElementById('contact').value,
                    image: reader.result,
                    date: Date.now()
                });
                e.target.reset();
            };
            reader.readAsDataURL(document.getElementById('image').files[0]);
        };

        document.getElementById('news-form').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "news"), {
                title: document.getElementById('news-title').value,
                content: document.getElementById('news-content').value,
                date: Date.now()
            });
            e.target.reset();
        };

        document.getElementById('event-form').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "events"), {
                name: document.getElementById('event-name').value,
                eventDate: document.getElementById('event-date').value,
                location: document.getElementById('event-location').value
            });
            e.target.reset();
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);
        document.getElementById('filter-category').onchange = renderProducts;

        const cats = ["Tecnología", "Vehículos", "Hogar", "Ropa", "Servicios", "Otros"];
        document.getElementById('category').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');

        // Modal de login simple
        document.getElementById('admin-main-btn').onclick = async () => {
            const email = prompt("Email:");
            const pass = prompt("Password:");
            if(email && pass) {
                try { await signInWithEmailAndPassword(auth, email, pass); } 
                catch(e) { alert("Error"); }
            }
        };

    </script>
</body>
</html>
